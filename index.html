<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <title>Exercitando responsividade</title>
</head>

<body>
    <!-- Main container (login card) -->
    <section>
        <!-- User icon -->
        <div class="image">
            <img class="icone" src="img/user-solid.png" alt="">
        </div>

        <!-- Title -->
        <h1>Welcome!</h1>

        <!-- Subtitle / description -->
        <p classe="paragraph-login">Log in to yoour account to continue!</p> <br>

        <!-- Login form -->
        <form action="#" method="post">
            <!-- Email input -->
            <input type="email" placeholder="Email address" required><br><br>

            <!-- Password input -->
            <input type="password" placeholder="Password" required><br><br>

            <!-- Forgot password link -->
            <a class="forgot" href="#">Forgot password?</a><br>

            <!-- Submit button -->
            <button>log in</button><br><br>

            <!-- Sign up redirect -->
            <p class="paragraph">Don´t have an account? <a href="#">Sign up</a></p>
        </form><br>

        <!-- Social login options -->
        <div class="social-media">

            <!-- Google login -->
            <a class="google" href="#"><img width="24" height="24" src="https://img.icons8.com/color/48/google-logo.png"
                    alt="google-logo" />Google</a>

            <!-- Google login -->
            <a class="linkedin" href="#"><img width="28" height="28"
                    src="https://img.icons8.com/fluency/48/linkedin.png" alt="linkedin" />Linkedin</a>
        </div>
    </section>




</body>

</html>
